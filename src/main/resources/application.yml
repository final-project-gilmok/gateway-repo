server:
  port: 8080

spring:
  profiles:
    active: dev

  application:
    name: gateway

  cloud:
    gateway:
      routes:
        # [1] 인증 서버
        - id: auth
          uri: ${AUTH_SERVER_URL:http://localhost:9000}
          predicates:
            - Path=/api/auth/**

        # [2] 메인 API 서버
        - id: api
          uri: ${API_SERVER_URL:http://localhost:8081}
          predicates:
            - Path=/api/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET, POST, PUT, DELETE, OPTIONS
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
