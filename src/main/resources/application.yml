server:
  port: 8080

spring:
  profiles:
    active: dev

  application:
    name: gateway

  cloud:
    gateway:
      routes:
        # [1] 인증 서버
        - id: auth
          uri: ${AUTH_SERVER_URL:http://localhost:9000}
          predicates:
            - Path=/api/auth/**

        # [2] 메인 API 서버
        - id: api
          uri: ${API_SERVER_URL:http://localhost:8081}
          predicates:
            - Path=/api/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

      globalcors:
        cors-configurations:
          '[/**]':
            # 1. Origin 구체적으로 명시 (보안 + Credentials 호환)
            # 개발용이라면 패턴 사용 가능
            allowedOriginPatterns:
              - "http://localhost:3000"
              - "http://localhost:*"

            # 2. 메서드는 리스트로 분리 (문자열 X)
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS

            allowedHeaders: "*"
            allowCredentials: true # 프론트와 쿠키/토큰 주고받으려면 필수

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0